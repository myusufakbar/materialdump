<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Topological Sort (Kahn) - Step by Step</title>
    <style>
        :root {
            --bg-1: #eef6fb;
            --bg-2: #ffffff;
            --panel: rgba(255, 255, 255, 0.75);
            --muted: #6b7280;
            --accent: #3b82f6;
            --accent-2: #f97316;
            --success: #10b981;
            --danger: #ef4444;
            --glass-border: rgba(99, 102, 241, 0.12);
            --card-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            --glass-radius: 12px;
            font-family: Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 16px;
            background: radial-gradient(1200px 400px at 10% 10%, rgba(59, 130, 246, 0.06), transparent 8%),
                linear-gradient(180deg, var(--bg-1), var(--bg-2));
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h2 {
            margin: 0 0 12px 0;
            font-weight: 600;
            color: #0b1220;
            letter-spacing: 0.2px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        button,
        select {
            appearance: none;
            border: none;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(243, 244, 246, 0.9));
            border-radius: 10px;
            padding: 8px 12px;
            box-shadow: 0 2px 6px rgba(2, 6, 23, 0.06);
            cursor: pointer;
            color: #0b1220;
            font-weight: 600;
            transition: transform .12s ease, box-shadow .12s ease, opacity .12s;
            border: 1px solid rgba(15, 23, 42, 0.06);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(2, 6, 23, 0.08);
        }

        button:disabled {
            opacity: .55;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #btnPlay {
            background: linear-gradient(180deg, var(--accent), #2563eb);
            color: white;
        }

        #btnPause {
            background: linear-gradient(180deg, #f97316, #ea580c);
            color: white;
        }

        #btnReset {
            background: linear-gradient(180deg, #efefef, #e6eefc);
            color: #0b1220;
        }

        #btnStep,
        #btnPrev {
            background: linear-gradient(180deg, #fff, #f7fafc);
        }

        label {
            color: var(--muted);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel {
            display: flex;
            gap: 18px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        /* Graph card */
        .graph {
            width: 560px;
            height: 360px;
            border-radius: var(--glass-radius);
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.85), rgba(248, 250, 252, 0.75));
            padding: 8px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }

        /* subtle grid background */
        .graph::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(15, 23, 42, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 23, 42, 0.02) 1px, transparent 1px);
            background-size: 60px 60px, 60px 60px;
            pointer-events: none;
            opacity: .6;
        }

        svg {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .node {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(180deg, #fff, #f3f6ff);
            border: 2px solid rgba(15, 23, 42, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0b1220;
            font-size: 16px;
            transition: background .25s, transform .18s, box-shadow .18s, border-color .18s;
            box-shadow: 0 6px 18px rgba(2, 6, 23, 0.06), inset 0 -3px 6px rgba(255, 255, 255, 0.7);
            user-select: none;
        }

        .node:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 14px 30px rgba(2, 6, 23, 0.08);
        }

        .node.processed {
            background: linear-gradient(180deg, #bbf7d0, #34d399);
            border-color: rgba(16, 185, 129, 0.9);
            color: #064e3b;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.14);
        }

        .node.current {
            background: linear-gradient(180deg, #fff3db, #ffd166);
            border-color: rgba(249, 115, 22, 0.95);
            transform: scale(1.08);
            box-shadow: 0 10px 28px rgba(249, 115, 22, 0.14);
            color: #4b2e00;
        }

        /* edges */
        .edge {
            stroke: #94a3b8;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            transition: stroke .2s, stroke-width .15s, filter .15s;
        }

        .edge.highlight {
            stroke: var(--accent-2);
            stroke-width: 4;
            filter: drop-shadow(0 6px 8px rgba(249, 115, 22, 0.12));
        }

        /* right info card */
        .info {
            min-width: 340px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.85), rgba(250, 250, 255, 0.7));
            border-radius: 12px;
            padding: 12px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(15, 23, 42, 0.04);
        }

        .info h4 {
            margin: 8px 0 6px 0;
            font-size: 15px;
            color: #0b1220;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: transparent;
        }

        thead th {
            text-align: left;
            padding: 8px 10px;
            font-weight: 700;
            font-size: 13px;
            color: var(--muted);
            background: transparent;
        }

        td,
        th {
            padding: 6px 10px;
            text-align: left;
            vertical-align: middle;
            font-size: 14px;
            color: #0b1220;
        }

        tbody tr {
            border-top: 1px solid rgba(15, 23, 42, 0.04);
        }

        tbody tr:nth-child(odd) {
            background: linear-gradient(90deg, rgba(250, 250, 255, 0.4), transparent);
        }

        .queue {
            min-height: 40px;
            border-radius: 10px;
            padding: 10px;
            margin-top: 6px;
            background: linear-gradient(180deg, #fffef6, #fffbf1);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: inset 0 2px 0 rgba(15, 23, 42, 0.02);
        }

        .queue .item {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            border-radius: 999px;
            background: linear-gradient(180deg, #eef2ff, #e0e7ff);
            color: #0b1220;
            font-weight: 700;
            box-shadow: 0 6px 12px rgba(14, 165, 233, 0.06);
            border: 1px solid rgba(59, 130, 246, 0.12);
            min-width: 28px;
        }

        .order {
            min-height: 40px;
            padding: 10px;
            border-radius: 10px;
            background: linear-gradient(180deg, #f4fffb, #ecfff6);
            margin-top: 6px;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .order .chip {
            background: linear-gradient(180deg, #d1fae5, #bbf7d0);
            padding: 6px 10px;
            border-radius: 8px;
            font-weight: 700;
            color: #064e3b;
            border: 1px solid rgba(16, 185, 129, 0.12);
        }

        .log {
            max-height: 140px;
            overflow: auto;
            margin-top: 8px;
            padding: 10px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid rgba(15, 23, 42, 0.04);
            font-size: 13px;
            color: #0f172a;
            box-shadow: 0 6px 18px rgba(2, 6, 23, 0.04);
        }

        .log div {
            padding: 4px 0;
            border-bottom: 1px dashed rgba(15, 23, 42, 0.03);
        }

        .log div:last-child {
            border-bottom: none;
        }

        @media (max-width:960px) {
            .panel {
                flex-direction: column;
            }

            .graph {
                width: 100%;
                height: 340px;
            }

            .info {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <h2>Topological Sort (Kahn) - Step by Step</h2>

    <div class="controls">
        <button id="btnCalc">Calc Indegrees</button>
        <button id="btnPrev" disabled>Prev</button>
        <button id="btnStep">Step</button>
        <button id="btnPlay">Play</button>
        <button id="btnPause" disabled>Pause</button>
        <button id="btnReset">Reset</button>
        <label>Speed:
            <select id="speed">
                <option value="1200">Slow</option>
                <option value="700" selected>Normal</option>
                <option value="300">Fast</option>
            </select>
        </label>
    </div>

    <div class="panel">
        <div>
            <div class="graph" id="graph">
                <svg width="560" height="360" style="position:absolute; left:0; top:0; pointer-events:none;">
                    <defs>
                        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7"
                            orient="auto">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"></path>
                        </marker>
                        <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8"
                            orient="auto">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(249,115,22,0.95)"></path>
                        </marker>
                    </defs>
                    <!-- Edges will be inserted here -->
                </svg>

                <!-- Nodes -->
                <!-- positions chosen for clear layout -->
                <div class="node" id="n1" style="left:40px; top:40px">1</div>
                <div class="node" id="n2" style="left:220px; top:40px">2</div>
                <div class="node" id="n3" style="left:380px; top:40px">3</div>

                <div class="node" id="n4" style="left:120px; top:160px">4</div>
                <div class="node" id="n5" style="left:260px; top:180px">5</div>
                <div class="node" id="n6" style="left:420px; top:200px">6</div>
            </div>
        </div>

        <div class="info">
            <h4>Indegrees</h4>
            <table id="indegTable">
                <thead>
                    <tr>
                        <th>Node</th>
                        <th>Indegree</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <h4 style="margin-top:12px;">Queue (choose smallest when tie)</h4>
            <div class="queue" id="queue"></div>

            <h4 style="margin-top:12px;">Processed Order</h4>
            <div class="order" id="order"></div>

            <h4 style="margin-top:12px;">Log</h4>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        (function () {
            // DAG adjacency list
            const adj = {
                1: [4, 2],
                2: [3],
                3: [],
                4: [2, 5, 6],
                5: [6],
                6: []
            };
            const nodes = [1, 2, 3, 4, 5, 6];

            // UI elements
            const indegTableBody = document.querySelector('#indegTable tbody');
            const queueDiv = document.getElementById('queue');
            const orderDiv = document.getElementById('order');
            const logDiv = document.getElementById('log');
            const btnCalc = document.getElementById('btnCalc');
            const btnPrev = document.getElementById('btnPrev');
            const btnStep = document.getElementById('btnStep');
            const btnPlay = document.getElementById('btnPlay');
            const btnPause = document.getElementById('btnPause');
            const btnReset = document.getElementById('btnReset');
            const speedSelect = document.getElementById('speed');
            const svg = document.querySelector('#graph svg');
            const nodeElems = {};
            nodes.forEach(n => nodeElems[n] = document.getElementById('n' + n));

            // create edges as SVG paths with arrow
            const nodeCenters = {};
            nodes.forEach(n => {
                const el = nodeElems[n];
                const left = parseFloat(el.style.left);
                const top = parseFloat(el.style.top);
                nodeCenters[n] = { x: left + el.offsetWidth / 2, y: top + el.offsetHeight / 2 };
            });

            const edgeMap = {}; // key "u_v" -> svg path
            function drawEdge(u, v) {
                const a = nodeCenters[u], b = nodeCenters[v];
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');

                const dx = b.x - a.x, dy = b.y - a.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const R = 32; // Offset by node radius + padding to keep arrows visible

                const startX = a.x + (dx / dist) * R;
                const startY = a.y + (dy / dist) * R;
                const endX = b.x - (dx / dist) * R;
                const endY = b.y - (dy / dist) * R;

                const newDx = endX - startX, newDy = endY - startY;
                const mx = (startX + endX) / 2, my = (startY + endY) / 2;
                const cx = mx - newDy * 0.14, cy = my + newDx * 0.14;

                const d = `M ${startX} ${startY} Q ${cx} ${cy} ${endX} ${endY}`;
                path.setAttribute('d', d);
                path.setAttribute('class', 'edge');
                path.setAttribute('id', 'e' + u + '_' + v);
                path.setAttribute('marker-end', 'url(#arrow)');
                svg.appendChild(path);
                edgeMap[u + '_' + v] = path;
            }

            // build edges from adj
            for (const u of nodes) {
                for (const v of adj[u]) drawEdge(u, v);
            }

            // algorithm state
            let indeg = {};
            let queue = [];
            let processed = [];
            let playing = false;
            let timer = null;
            let initNodeIndex = 0;

            // history snapshots: initial state at index 0
            const history = [];
            let historyIndex = -1;



            function renderIndeg() {
                indegTableBody.innerHTML = '';
                nodes.forEach(n => {
                    const tr = document.createElement('tr');
                    const tdn = document.createElement('td'); tdn.textContent = n;
                    const tdi = document.createElement('td'); tdi.id = 'ind_' + n; tdi.textContent = indeg[n];
                    tr.appendChild(tdn); tr.appendChild(tdi);
                    indegTableBody.appendChild(tr);
                });
            }

            function renderQueue() {
                queueDiv.innerHTML = '';
                queue.forEach(x => {
                    const el = document.createElement('span'); el.className = 'item'; el.textContent = x;
                    queueDiv.appendChild(el);
                });
            }

            function renderOrder() {
                orderDiv.innerHTML = '';
                processed.forEach(x => {
                    const el = document.createElement('div'); el.className = 'chip'; el.textContent = x;
                    orderDiv.appendChild(el);
                });
            }

            function log(msg) {
                const p = document.createElement('div'); p.textContent = msg;
                logDiv.appendChild(p);
                logDiv.scrollTop = logDiv.scrollHeight;
            }

            function resetViz() {
                nodes.forEach(n => {
                    nodeElems[n].classList.remove('processed', 'current');
                });
                for (const k in edgeMap) edgeMap[k].classList.remove('highlight');
            }

            function takeSnapshot() {
                // deep copy simple structures
                const indegCopy = {};
                for (const k in indeg) indegCopy[k] = indeg[k];
                return {
                    indeg: indegCopy,
                    queue: queue.slice(),
                    processed: processed.slice(),
                    initNodeIndex: initNodeIndex
                };
            }

            function restoreSnapshot(snap) {
                indeg = {};
                for (const k in snap.indeg) indeg[k] = snap.indeg[k];
                queue = snap.queue.slice();
                processed = snap.processed.slice();
                initNodeIndex = snap.initNodeIndex;
                // visuals
                renderIndeg();
                resetViz();
                // mark processed nodes
                processed.forEach(n => nodeElems[n].classList.add('processed'));
                renderQueue();
                renderOrder();

                if (initNodeIndex < nodes.length) {
                    log('Restored state: calculating indegrees (node index ' + initNodeIndex + ')');
                } else {
                    log('Restored state: processed=[' + processed.join(', ') + '], queue=[' + queue.join(', ') + ']');
                }

                updateControls();
            }

            function pushSnapshot(snap) {
                // if we had undone (historyIndex not at end), drop future history
                if (historyIndex < history.length - 1) {
                    history.splice(historyIndex + 1);
                }
                history.push(snap);
                historyIndex = history.length - 1;
                updateControls();
            }

            function updateControls() {
                const isCalcPhase = initNodeIndex < nodes.length;
                btnCalc.disabled = !isCalcPhase || playing;
                btnPrev.disabled = (historyIndex <= 0) || playing;
                btnStep.disabled = isCalcPhase || playing;
                btnPlay.disabled = isCalcPhase || playing || (processed.length === nodes.length && historyIndex === history.length - 1);
                btnPause.disabled = !playing;
            }

            function reset() {
                stopPlay();

                indeg = {};
                nodes.forEach(n => indeg[n] = 0);
                processed = [];
                queue = [];
                initNodeIndex = 0;

                renderIndeg();
                resetViz();
                renderQueue();
                renderOrder();
                logDiv.innerHTML = '';
                log('Initialized. Ready to calculate indegrees.');
                // history init
                history.length = 0;
                historyIndex = -1;
                pushSnapshot(takeSnapshot());
            }

            function highlightEdge(u, v) {
                const e = edgeMap[u + '_' + v];
                if (!e) return;
                // use alternate marker while highlighted if available
                try {
                    e.setAttribute('marker-end', 'url(#arrow-accent)');
                } catch (e) { }
                e.classList.add('highlight');
                setTimeout(() => {
                    e.classList.remove('highlight');
                    try { e.setAttribute('marker-end', 'url(#arrow)'); } catch (e) { }
                }, 600);
            }

            async function stepOnce() {
                if (initNodeIndex < nodes.length) {
                    // Phase 1: Calculating indegrees
                    const u = nodes[initNodeIndex];
                    nodeElems[u].classList.add('current');
                    log('Checking outgoing edges of node ' + u + ' to calculate indegrees.');
                    await new Promise(r => setTimeout(r, 420));

                    if (adj[u].length === 0) {
                        log('Node ' + u + ' has no outgoing edges.');
                    }

                    for (const v of adj[u]) {
                        highlightEdge(u, v);
                        indeg[v]++;
                        const tdi = document.getElementById('ind_' + v);
                        if (tdi) { tdi.textContent = indeg[v]; }
                        log('Edge ' + u + ' -> ' + v + ' increases indegree of ' + v + ' to ' + indeg[v]);
                        await new Promise(r => setTimeout(r, 360));
                    }

                    nodeElems[u].classList.remove('current');
                    initNodeIndex++;

                    if (initNodeIndex === nodes.length) {
                        // Finished calculating indegrees, now find initial queue
                        queue = nodes.filter(n => indeg[n] === 0);
                        queue.sort((a, b) => a - b);
                        log('Finished calculating indegrees. Initial queue: [' + queue.join(', ') + ']');
                        renderQueue();
                    }

                    pushSnapshot(takeSnapshot());
                    updateControls();
                    return;
                }

                // Phase 2: Topological Sort (original logic)
                if (queue.length === 0) {
                    if (processed.length === nodes.length) {
                        log('Done. Final order: ' + processed.join(', '));
                    } else {
                        log('Cycle detected: no node with indegree 0 but unprocessed nodes remain.');
                    }
                    stopPlay();
                    updateControls();
                    return;
                }

                // pick smallest node in queue
                queue.sort((a, b) => a - b);
                const u = queue.shift();
                // mark current
                nodeElems[u].classList.add('current');
                renderQueue();
                log('Processing node ' + u + ' from queue');
                await new Promise(r => setTimeout(r, 420));
                // finalize u
                nodeElems[u].classList.remove('current');
                nodeElems[u].classList.add('processed');
                processed.push(u);
                renderOrder();

                // for each outgoing edge, reduce indegree
                for (const v of adj[u]) {
                    highlightEdge(u, v);
                    indeg[v]--;
                    const tdi = document.getElementById('ind_' + v);
                    if (tdi) { tdi.textContent = indeg[v]; }
                    log('Edge ' + u + ' -> ' + v + ' reduces indegree of ' + v + ' to ' + indeg[v]);
                    if (indeg[v] === 0) {
                        queue.push(v);
                        queue.sort((a, b) => a - b);
                        log('Node ' + v + ' added to queue.');
                    }
                    await new Promise(r => setTimeout(r, 360));
                }
                renderQueue();

                // after finishing this step, take snapshot so we can go back
                pushSnapshot(takeSnapshot());

                if (processed.length === nodes.length) {
                    log('Finished. Final topological order: ' + processed.join(', '));
                    stopPlay();
                }
                updateControls();
            }

            function step() {
                if (playing) return;
                // if there is a forward snapshot available (we previously stepped forward then back), just restore it
                if (historyIndex < history.length - 1) {
                    historyIndex++;
                    restoreSnapshot(history[historyIndex]);
                    return;
                }
                // else perform an actual step (with animation)
                stepOnce();
            }

            function prev() {
                stopPlay();
                if (historyIndex <= 0) return;
                historyIndex--;
                restoreSnapshot(history[historyIndex]);
            }

            function playCalc() {
                if (playing) return;
                playing = true;
                updateControls();
                const run = async () => {
                    if (!playing) return;
                    if (initNodeIndex < nodes.length) {
                        if (historyIndex < history.length - 1) {
                            historyIndex++;
                            restoreSnapshot(history[historyIndex]);
                            if (initNodeIndex === nodes.length) { stopPlay(); return; }
                            timer = setTimeout(run, parseInt(speedSelect.value, 10));
                            return;
                        }
                        await stepOnce();
                        if (initNodeIndex === nodes.length || !playing) { stopPlay(); return; }
                        timer = setTimeout(run, parseInt(speedSelect.value, 10));
                    } else {
                        stopPlay();
                    }
                };
                timer = setTimeout(run, 0);
            }

            function play() {
                if (playing) return;
                playing = true;
                btnPlay.disabled = true;
                btnPause.disabled = false;
                btnStep.disabled = true;
                btnPrev.disabled = true;
                const run = async () => {
                    if (!playing) return;
                    // if we have future snapshot, quickly advance to it without animation
                    if (historyIndex < history.length - 1) {
                        historyIndex++;
                        restoreSnapshot(history[historyIndex]);
                        if (processed.length === nodes.length) { stopPlay(); return; }
                        timer = setTimeout(run, parseInt(speedSelect.value, 10));
                        return;
                    }
                    await stepOnce(); // performs animations and pushes snapshot
                    if (processed.length === nodes.length || !playing) { stopPlay(); return; }
                    timer = setTimeout(run, parseInt(speedSelect.value, 10));
                };
                timer = setTimeout(run, 0);
                updateControls();
            }

            function stopPlay() {
                playing = false;
                btnPlay.disabled = false;
                btnPause.disabled = true;
                btnStep.disabled = false;
                if (timer) clearTimeout(timer);
                timer = null;
                updateControls();
            }

            // event wiring
            btnCalc.addEventListener('click', playCalc);
            btnPrev.addEventListener('click', prev);
            btnStep.addEventListener('click', step);
            btnPlay.addEventListener('click', play);
            btnPause.addEventListener('click', stopPlay);
            btnReset.addEventListener('click', reset);

            // initialize
            computeIndeg();
            reset();
        })();
    </script>

</body>

</html>
